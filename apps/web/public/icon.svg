<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="120" fill="#0b0f19"/>
  <circle cx="256" cy="256" r="220" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="8"/>
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="lock-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#a800ff"/>
    </linearGradient>
  </defs>
  <g transform="translate(146, 116)">
    <!-- Lock Shackle -->
    <path d="M40 90 V60 C40 27 67 0 100 0 C133 0 160 27 160 60 V90" fill="none" stroke="url(#lock-grad)" stroke-width="28" stroke-linecap="round"/>
    <!-- Lock Body -->
    <rect x="0" y="80" width="200" height="150" rx="30" fill="url(#lock-grad)" filter="drop-shadow(0 10px 20px rgba(0, 210, 255, 0.3))"/>
    <!-- Keyhole -->
    <circle cx="100" cy="145" r="16" fill="#0b0f19"/>
    <path d="M94 145 L90 190 H110 L106 145 Z" fill="#0b0f19"/>
  </g>
</svg>
